{% extends "base.html" %}

{% block title %}Login | WeatherAUS Predictor{% endblock %}

{% block content %}
<div class="login-page">
    <div class="rain-container" id="rain-container"></div>
    
    <div class="login-card animate-in">
        <div class="app-branding">
            <span class="app-icon">🌦️</span>
            <h1>WeatherAUS</h1>
            <p class="subtitle">ML & DL Rain Prediction System</p>
        </div>
        
        <form method="POST" action="{{ url_for('login') }}" class="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="username" name="username" class="input-field" placeholder="Enter username" required value="admin">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" name="password" class="input-field" placeholder="Enter password" required value="password123">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-full login-btn">Login to System</button>
        </form>
    </div>
</div>
{% endblock %}
